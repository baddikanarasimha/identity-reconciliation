services:
  # ── Backend Web Service ────────────────────────────────────────────────────
  - type: web
    name: identity-reconciliation-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: identity-reconciliation-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-url.onrender.com
      - key: LOG_LEVEL
        value: info

  # ── Frontend Web Service ───────────────────────────────────────────────────
  - type: web
    name: identity-reconciliation-ui
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://identity-reconciliation-api.onrender.com/api

# ── PostgreSQL Database ────────────────────────────────────────────────────
databases:
  - name: identity-reconciliation-db
    databaseName: identity_reconciliation
    user: postgres
    plan: free
